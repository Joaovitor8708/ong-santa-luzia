<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Abrigo Santa Luzia</title>
    <link rel="stylesheet" href="dashboard.css">
</head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>

<header class="header">
    <div class="logo-area">
        <img src="Logo Abrigo Santa Luzia.png" alt="Logo">
        <h1>Dashboard</h1>
    </div>

    <nav>
        <ul>
            <li><a href="#">Visão Geral</a></li>
            <li><a href="#">Usuários</a></li>
            <li><a href="#">Configurações</a></li>
            <li><a href="#">Sair</a></li>
        </ul>
    </nav>
</header>

<main>

<section class="dashboard">

    <h2>Nosso Impacto</h2>

    <div class="dashboard-container">

        <!-- CARD -->
<!-- CARD -->
<div class="box" onclick="toggleLista()">
    <h3>42</h3>
    <p>👵 Idosos acolhidos</p>
</div>

<!-- LISTA -->
<div id="lista-idosos" class="lista-idosos">

    <h2>Lista de Idosos</h2>

    <!-- BOTÃO ADICIONAR -->
    <button class="btn-add" onclick="abrirForm()">+ Adicionar Idoso</button>

    <!-- FORMULÁRIO (ESCONDIDO) -->
    <div id="form-container" class="form-container">
        <input type="text" id="nome" placeholder="Nome">
        <input type="number" id="idade" placeholder="Idade">
        <input type="text" id="cpf" placeholder="CPF">
        <input type="text" id="responsavel" placeholder="Responsável">

        <button onclick="salvar()">Salvar</button>
    </div>

    <!-- TABELA -->
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>CPF</th>
                <th>Responsável</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="corpo-tabela"></tbody>
    </table>

</div>

        <div class="box">
            <h3>1280+</h3>
            <p>🍽️ Refeições por mês</p>
        </div>

        <div class="box">
            <h3>315</h3>
            <p>❤️ Doadores</p>
        </div>

        <div class="box">
            <h3>20</h3>
            <p>🤝 Voluntários</p>
        </div>

    </div>

</section>


</main>

<canvas id="grafico"></canvas>

<script src="dashboard.js"></script>
</body>
</html>
